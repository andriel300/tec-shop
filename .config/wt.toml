# Worktrunk project configuration for tec-shop
# Docs: https://worktrunk.dev/hook/
#
# This file is checked into git and applies to every developer on the team.
# Personal preferences (LLM commit generation, path templates) go in
# ~/.config/worktrunk/config.toml instead.

# ---------------------------------------------------------------------------
# post-create — blocking tasks that must finish before you start working
# ---------------------------------------------------------------------------
# Runs once when the worktree is first created. Failures are logged but
# do not abort the switch (non-fail-fast).

[post-create]

# Copy .env from the primary worktree. The .env file is gitignored so each
# worktree needs its own copy. Falls back gracefully if none exists yet.
env = """
if [ -f {{ primary_worktree_path }}/.env ]; then
    cp {{ primary_worktree_path }}/.env {{ worktree_path }}/.env
    echo '[wt] Copied .env from primary worktree'
else
    echo '[wt] No .env found in primary worktree — copy one manually before starting services'
fi
"""

# Symlink node_modules from the primary worktree instead of running pnpm install.
# Running pnpm install in a worktree AND wt step copy-ignored in post-start caused
# a mixed/corrupted node_modules (fresh install + copy merged on top), which
# triggered 100% CPU loops in Next.js/Turbopack. The symlink uses the exact same
# module resolution as main — no install, no disk duplication, no drift.
deps = "ln -sf {{ primary_worktree_path }}/node_modules {{ worktree_path }}/node_modules"

# ---------------------------------------------------------------------------
# post-start — background tasks that can run while you work
# ---------------------------------------------------------------------------
# Runs in the background after post-create. Useful for warming caches.
# Logs written to .git/wt/logs/<branch>-*-post-start-*.log

[post-start]

# Copy remaining gitignored files from the primary worktree in the background.
# Covers .next build caches, generated certs, and other dev artifacts so you
# don't wait for a cold rebuild on every new worktree.
copy = "wt step copy-ignored"

# ---------------------------------------------------------------------------
# pre-commit — runs during `wt merge` before the squash commit
# ---------------------------------------------------------------------------
# Targeted typecheck on the three services changed most often.
# Avoids nx affected which scans the entire monorepo and is too slow locally.

[pre-commit]


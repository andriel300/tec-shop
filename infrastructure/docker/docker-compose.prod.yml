version: "3.9"

# Production overrides for docker-compose.dev.yml
# Usage: docker compose -f docker-compose.dev.yml -f docker-compose.prod.yml up -d
# TODO: Set IMAGE_TAG, REGISTRY environment variables before deploying

services:
  api-gateway:
    image: ${REGISTRY}/tec-shop-api-gateway:${IMAGE_TAG}
    restart: always
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    image: ${REGISTRY}/tec-shop-auth-service:${IMAGE_TAG}
    restart: always

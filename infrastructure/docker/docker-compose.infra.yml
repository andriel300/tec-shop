# Local development infrastructure only.
# MongoDB is intentionally excluded — connect to MongoDB Atlas via mongodb+srv in .env.
# Starts Redis, Kafka, and Zookeeper so you can run NestJS services
# via `npx nx serve` with hot reload.
#
# Usage:
#   pnpm run infra:up    (start detached)
#   pnpm run infra:down  (stop and remove containers)
#   pnpm run infra:logs  (tail logs)
#
# Kafka UI:     http://localhost:8090
# Prometheus:   http://localhost:9090
# Grafana:      http://localhost:3030  (admin/admin)
# Alertmanager: http://localhost:9093
# Tempo:        http://localhost:3200

networks:
  tec-shop-infra:
    driver: bridge

volumes:
  redis-data:
  kafka-data:
  zookeeper-data:
  zookeeper-logs:
  grafana-data:
  tempo-data:

services:
  redis:
    image: redis:7-alpine
    container_name: tec-shop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tec-shop-infra
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tec-shop-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - tec-shop-infra
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tec-shop-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST/localhost:9092 — host-based NestJS services (KAFKA_BROKER=localhost:9092)
      # PLAINTEXT/kafka:29092         — intra-Docker communication (kafka-ui, kafka-init)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - tec-shop-infra
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tec-shop-kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tec-shop-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tec-shop-infra

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: tec-shop-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
      - "--enable-feature=native-histograms"
    volumes:
      - ../monitoring/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tec-shop-infra

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: tec-shop-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ../monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - tec-shop-infra

  grafana:
    image: grafana/grafana:11.1.0
    container_name: tec-shop-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - tec-shop-infra

  tempo:
    image: grafana/tempo:latest
    container_name: tec-shop-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../tracing/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # Tempo HTTP API
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      - tec-shop-infra

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: tec-shop-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - tec-shop-infra
    depends_on:
      - redis

  # mongodb-exporter is disabled — project uses MongoDB Atlas which has its own
  # built-in monitoring. The exporter requires direct wire protocol access and
  # Atlas credentials; use the Atlas UI for MongoDB metrics instead.
  # mongodb-exporter:
  #   image: percona/mongodb_exporter:0.40
  #   container_name: tec-shop-mongodb-exporter
  #   restart: unless-stopped
  #   command:
  #     - --mongodb.uri=mongodb://host.docker.internal:27017
  #     - --collect-all
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   ports:
  #     - "9216:9216"
  #   networks:
  #     - tec-shop-infra

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tec-shop-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tec-shop-infra
    restart: "no"
    command: >
      bash -c "
        echo 'Creating Kafka topics...'
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic chat.new_message --partitions 3 --replication-factor 1 --config retention.ms=604800000 --config segment.ms=86400000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic users-event --partitions 3 --replication-factor 1 --config retention.ms=2592000000 --config segment.ms=86400000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic log-events --partitions 3 --replication-factor 1 --config retention.ms=604800000 --config segment.ms=86400000
        echo 'Topics created:'
        kafka-topics --bootstrap-server kafka:29092 --list
      "

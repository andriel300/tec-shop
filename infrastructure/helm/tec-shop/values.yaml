# Default values for tec-shop Helm chart
# Override with values.dev.yaml or values.prod.yaml

global:
  # TODO: Set to your container registry (e.g., ghcr.io/your-org, docker.io/your-org)
  registry: "your-registry"
  imageTag: "latest"
  namespace: "tec-shop"
  imagePullPolicy: IfNotPresent
  # TODO: Add imagePullSecrets if using private registry
  # imagePullSecrets:
  #   - name: registry-credentials

# ─── Infrastructure Services ──────────────────────────────────────────────────

mongodb:
  enabled: false
  # TODO: Configure if deploying MongoDB via Helm dependency
  # auth:
  #   rootPassword: ""

redis:
  enabled: false
  # TODO: Configure if deploying Redis via Helm dependency

kafka:
  enabled: false
  # TODO: Configure if deploying Kafka via Helm dependency

# ─── Application Services ─────────────────────────────────────────────────────

services:
  api-gateway:
    enabled: true
    replicas: 2
    port: 8080
    metricsPort: 8080
    serviceType: ClusterIP
    image:
      name: tec-shop-api-gateway
    resources:
      requests:
        cpu: "250m"
        memory: "128Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

  auth-service:
    enabled: true
    replicas: 2
    port: 6001
    metricsPort: 9001
    serviceType: ClusterIP
    image:
      name: tec-shop-auth-service
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70

  user-service:
    enabled: true
    replicas: 2
    port: 6002
    metricsPort: 9002
    serviceType: ClusterIP
    image:
      name: tec-shop-user-service

# ─── Ingress ──────────────────────────────────────────────────────────────────

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    api: api.tec-shop.com
    userUi: tec-shop.com
    sellerUi: seller.tec-shop.com
    adminUi: admin.tec-shop.com
  tls:
    enabled: false
    # TODO: Enable TLS and configure cert-manager
    secretName: tec-shop-tls

# ─── ConfigMap ────────────────────────────────────────────────────────────────

config:
  nodeEnv: "production"
  redisHost: "redis"
  redisPort: "6379"
  mongoHost: "mongodb"
  mongoPort: "27017"
  kafkaBroker: "kafka:9092"
  corsOrigin: "https://tec-shop.com,https://seller.tec-shop.com,https://admin.tec-shop.com"

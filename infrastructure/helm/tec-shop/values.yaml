      maxReplicas: 5
      targetCPUUtilizationPercentage: 70

  product-service:
    enabled: true
    replicas: 2
    port: 6004
    serviceType: ClusterIP
    image:
      name: tec-shop-product-service
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "750m"
        memory: "384Mi"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70

  order-service:

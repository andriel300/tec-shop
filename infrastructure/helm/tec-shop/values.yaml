      maxReplicas: 8
      targetCPUUtilizationPercentage: 70

  admin-service:
    enabled: true
    replicas: 1
    port: 6006
    serviceType: ClusterIP
    image:
      name: tec-shop-admin-service
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"

# ─── Ingress ──────────────────────────────────────────────────────────────────

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  certManagerIssuer: "letsencrypt-prod"
  hosts:
    api: api.tec-shop.com
    userUi: tec-shop.com
    sellerUi: seller.tec-shop.com
    adminUi: admin.tec-shop.com
  tls:
    enabled: false
    secretName: tec-shop-tls
  # WebSocket service hostnames (chatting, notification, logger connect directly from the browser)
  wsHosts:
    chat: chat.tec-shop.com
    notify: notify.tec-shop.com

# ─── Application Services (continued) ────────────────────────────────────────

  notification-service:
    enabled: true
    replicas: 2
    port: 6012
    metricsPort: 6012
    serviceType: ClusterIP
    image:
      name: tec-shop-notification-service
    resources:

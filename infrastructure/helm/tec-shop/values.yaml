        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70

  user-ui:
    enabled: true
    replicas: 2
    port: 3000
    metricsPort: 3000
    serviceType: ClusterIP
    image:
      name: tec-shop-user-ui
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

  seller-ui:
    enabled: true
    replicas: 2
    port: 3000
    metricsPort: 3000
    serviceType: ClusterIP
    image:
      name: tec-shop-seller-ui
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70

  admin-ui:
    enabled: true
    replicas: 1
    port: 3000
    metricsPort: 3000
    serviceType: ClusterIP
    image:
      name: tec-shop-admin-ui
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"

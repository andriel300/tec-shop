        memory: "256Mi"
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70

# ─── ConfigMap ────────────────────────────────────────────────────────────────

config:
  nodeEnv: "production"
  redisHost: "redis"
  redisPort: "6379"
  mongoHost: "mongodb"
  mongoPort: "27017"
  kafkaBroker: "kafka:9092"
  kafkaSsl: ""
  corsOrigin: "https://tec-shop.com,https://seller.tec-shop.com,https://admin.tec-shop.com"
  # Internal K8s URL used by Next.js server-side rendering to reach the API gateway
  backendUrl: "http://api-gateway:8080"

# ─── mTLS Certificates ────────────────────────────────────────────────────────

certsEnabled: true
certsSecretName: "tec-shop-certs"

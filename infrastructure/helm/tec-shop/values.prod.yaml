# Production environment overrides
# Usage: helm upgrade --install tec-shop ./infrastructure/helm/tec-shop -f values.yaml -f values.prod.yaml

global:
  # Set to your GitHub username/org. Images are pushed to GHCR by CI.
  # Example: ghcr.io/your-github-username
  registry: "ghcr.io/REPLACE_WITH_GITHUB_USERNAME"
  # Set to the git SHA or release tag from CI, e.g. a1b2c3d or v1.0.0
  imageTag: "REPLACE_WITH_RELEASE_TAG"
  imagePullPolicy: IfNotPresent

config:
  nodeEnv: "production"

services:
  api-gateway:
    replicas: 3
    resources:
      requests:
        cpu: "500m"
        memory: "256Mi"
      limits:
        cpu: "2000m"
        memory: "1Gi"
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 15
      targetCPUUtilizationPercentage: 60
      targetMemoryUtilizationPercentage: 75

  auth-service:
    replicas: 3
    resources:
      requests:
        cpu: "200m"
        memory: "128Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 60
      targetMemoryUtilizationPercentage: 75

  user-service:
    replicas: 3
    resources:
      requests:
        cpu: "200m"
        memory: "128Mi"
      limits:
        cpu: "1000m"

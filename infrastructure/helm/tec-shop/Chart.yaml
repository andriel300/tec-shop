apiVersion: v2
name: tec-shop
description: TecShop e-commerce platform - NestJS microservices on Kubernetes
type: application

# Chart version - increment on each chart change
version: 0.1.0

# Application version - matches the Docker image tag
appVersion: "0.1.0"

keywords:
  - e-commerce
  - microservices
  - nestjs

maintainers:
  - name: TecShop Team
    # TODO: Add maintainer email

dependencies:
  - name: mongodb
    version: ">=14.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled

  - name: redis
    version: ">=17.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled

  - name: kafka
    version: ">=26.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled

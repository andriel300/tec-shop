{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tec-shop-ingress
  namespace: {{ include "tec-shop.namespace" . }}
  labels:
    {{- include "tec-shop.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManagerIssuer | default "letsencrypt-prod" | quote }}
    {{- end }}
    # WebSocket proxy timeouts — required for long-lived Socket.IO connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.api }}
        - {{ .Values.ingress.hosts.userUi }}
        - {{ .Values.ingress.hosts.sellerUi }}
        - {{ .Values.ingress.hosts.adminUi }}
        {{- if .Values.ingress.wsHosts }}
        - {{ .Values.ingress.wsHosts.chat }}
        - {{ .Values.ingress.wsHosts.notify }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ (index .Values.services "api-gateway").port }}

    - host: {{ .Values.ingress.hosts.userUi }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # TODO: Add user-ui to services values and deploy as K8s service
                name: user-ui
                port:
                  number: 3000

    - host: {{ .Values.ingress.hosts.sellerUi }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # TODO: Add seller-ui to services values and deploy as K8s service
                name: seller-ui
                port:
                  number: 3000

    - host: {{ .Values.ingress.hosts.adminUi }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 3000

    {{- if .Values.ingress.wsHosts }}
    # ── WebSocket services (browsers connect directly, not via api-gateway) ───
    - host: {{ .Values.ingress.wsHosts.chat }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatting-service
                port:
                  number: {{ (index .Values.services "chatting-service").port }}

    - host: {{ .Values.ingress.wsHosts.notify }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: {{ (index .Values.services "notification-service").port }}
    {{- end }}
{{- end }}

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tec-shop-ingress
  namespace: {{ include "tec-shop.namespace" . }}
  labels:
    {{- include "tec-shop.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # TODO: Add cert-manager annotation when TLS is configured
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.api }}
        - {{ .Values.ingress.hosts.userUi }}
        - {{ .Values.ingress.hosts.sellerUi }}
        - {{ .Values.ingress.hosts.adminUi }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.services.api-gateway.port }}

    - host: {{ .Values.ingress.hosts.userUi }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # TODO: Add user-ui to services values and deploy as K8s service
                name: user-ui
                port:
                  number: 3000

    - host: {{ .Values.ingress.hosts.sellerUi }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # TODO: Add seller-ui to services values and deploy as K8s service
                name: seller-ui
                port:
                  number: 3000

    - host: {{ .Values.ingress.hosts.adminUi }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # TODO: Add admin-ui to services values and deploy as K8s service
                name: admin-ui
                port:
                  number: 3000
{{- end }}

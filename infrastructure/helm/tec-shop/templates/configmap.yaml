apiVersion: v1
kind: ConfigMap
metadata:
  name: tec-shop-config
  namespace: {{ include "tec-shop.namespace" . }}
  labels:
    {{- include "tec-shop.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}

  # Internal cluster service URLs (auto-resolved via Kubernetes DNS)
  AUTH_SERVICE_HOST: "auth-service"
  AUTH_SERVICE_PORT: {{ (index .Values.services "auth-service").port | quote }}

  USER_SERVICE_HOST: "user-service"
  USER_SERVICE_PORT: {{ (index .Values.services "user-service").port | quote }}

  SELLER_SERVICE_HOST: "seller-service"
  SELLER_SERVICE_PORT: {{ (index .Values.services "seller-service").port | quote }}

  PRODUCT_SERVICE_HOST: "product-service"
  PRODUCT_SERVICE_PORT: {{ (index .Values.services "product-service").port | quote }}

  ORDER_SERVICE_HOST: "order-service"
  ORDER_SERVICE_PORT: {{ (index .Values.services "order-service").port | quote }}

  ADMIN_SERVICE_HOST: "admin-service"
  ADMIN_SERVICE_PORT: {{ (index .Values.services "admin-service").port | quote }}

  CHATTING_SERVICE_HOST: "chatting-service"
  CHATTING_SERVICE_PORT: {{ (index .Values.services "chatting-service").port | quote }}

  LOGGER_SERVICE_HOST: "logger-service"
  LOGGER_SERVICE_PORT: {{ (index .Values.services "logger-service").port | quote }}

  KAFKA_SERVICE_HOST: "kafka-service"
  KAFKA_SERVICE_PORT: {{ (index .Values.services "kafka-service").port | quote }}

  RECOMMENDATION_SERVICE_HOST: "recommendation-service"
  RECOMMENDATION_SERVICE_PORT: {{ (index .Values.services "recommendation-service").port | quote }}

  # Infrastructure
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  REDIS_PORT: {{ .Values.config.redisPort | quote }}
  MONGO_HOST: {{ .Values.config.mongoHost | quote }}
  MONGO_PORT: {{ .Values.config.mongoPort | quote }}
  KAFKA_BROKER: {{ .Values.config.kafkaBroker | quote }}
  {{- if .Values.config.kafkaSsl }}
  KAFKA_SSL: {{ .Values.config.kafkaSsl | quote }}
  {{- end }}

  # CORS
  CORS_ORIGIN: {{ .Values.config.corsOrigin | quote }}

  # Next.js frontend — server-side rendering uses this URL to reach the API gateway
  # from inside the cluster. NEXT_PUBLIC_API_URL is baked at image build time (CI build-arg).
  BACKEND_URL: {{ .Values.config.backendUrl | default "http://api-gateway:8080" | quote }}

{{/*
Generic Deployment template that iterates over all enabled services.
TODO: If services need unique configurations, split into individual templates.
*/}}
{{- range $serviceName, $serviceConfig := .Values.services }}
{{- if $serviceConfig.enabled }}
{{- $probePort := $serviceConfig.metricsPort | default $serviceConfig.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  namespace: {{ include "tec-shop.namespace" $ }}
  labels:
    {{- include "tec-shop.labels" $ | nindent 4 }}
    app: {{ $serviceName }}
    app.kubernetes.io/name: {{ $serviceName }}
spec:
  replicas: {{ $serviceConfig.replicas }}
  selector:
    matchLabels:
      app: {{ $serviceName }}
  template:
    metadata:
      labels:
        app: {{ $serviceName }}
        app.kubernetes.io/name: {{ $serviceName }}
        app.kubernetes.io/part-of: {{ include "tec-shop.name" $ }}
    spec:
      containers:
        - name: {{ $serviceName }}
          image: {{ include "tec-shop.image" (dict "global" $.Values.global "service" $serviceConfig) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $serviceConfig.port }}
              protocol: TCP
            {{- if and $serviceConfig.metricsPort (ne ($serviceConfig.metricsPort | int) ($serviceConfig.port | int)) }}
            - containerPort: {{ $serviceConfig.metricsPort }}
              name: metrics
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: tec-shop-config
            - secretRef:
                name: tec-shop-secrets
          env:
            - name: PORT
              value: {{ $serviceConfig.port | quote }}
            - name: NODE_ENV
              value: {{ $.Values.config.nodeEnv | quote }}
          resources:
            requests:
              cpu: {{ $serviceConfig.resources.requests.cpu | quote }}
              memory: {{ $serviceConfig.resources.requests.memory | quote }}
            limits:
              cpu: {{ $serviceConfig.resources.limits.cpu | quote }}
              memory: {{ $serviceConfig.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $probePort }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            # TODO: Adjust per-service initialDelaySeconds in values overrides
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $probePort }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          {{- if $.Values.certsEnabled }}
          volumeMounts:
            - name: certs
              mountPath: /app/certs/{{ $serviceName }}/{{ $serviceName }}-key.pem
              subPath: {{ $serviceName }}-key.pem
              readOnly: true
            - name: certs
              mountPath: /app/certs/{{ $serviceName }}/{{ $serviceName }}-cert.pem
              subPath: {{ $serviceName }}-cert.pem
              readOnly: true
            - name: certs
              mountPath: /app/certs/ca/ca-cert.pem
              subPath: ca-cert.pem
              readOnly: true
          {{- end }}
      {{- if $.Values.certsEnabled }}
      volumes:
        - name: certs
          secret:
            secretName: {{ $.Values.certsSecretName | default "tec-shop-certs" }}
      {{- end }}
      # TODO: Add imagePullSecrets if using private registry
      # imagePullSecrets:
      #   - name: registry-credentials
{{- end }}
{{- end }}

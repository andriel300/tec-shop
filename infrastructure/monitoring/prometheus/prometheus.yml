# Prometheus configuration for TecShop
# TODO: Install @nestjs/prometheus and prom-client in each service to expose /metrics
# TODO: Update scrape targets to match actual service discovery (static vs Kubernetes SD)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    project: tec-shop
    # TODO: Add environment label (dev/staging/prod)
    # environment: production

# Load alert rules
rule_files:
  - "alerts/alerts.yml"
  # TODO: Add additional rule files as needed

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # API Gateway — metrics served under /api prefix
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8080"]
    metrics_path: /api/metrics

  # TCP microservices expose HTTP metrics on separate ports (9001-9010)
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:9001"]
    metrics_path: /metrics

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:9002"]
    metrics_path: /metrics

  - job_name: "seller-service"
    static_configs:
      - targets: ["seller-service:9003"]
    metrics_path: /metrics

  - job_name: "product-service"
    static_configs:
      - targets: ["product-service:9004"]
    metrics_path: /metrics

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:9005"]
    metrics_path: /metrics

  - job_name: "admin-service"
    static_configs:
      - targets: ["admin-service:9006"]
    metrics_path: /metrics

  # chatting-service, logger-service, and notification-service use their primary port for HTTP
  - job_name: "chatting-service"
    static_configs:
      - targets: ["chatting-service:6007"]
    metrics_path: /metrics

  - job_name: "logger-service"
    static_configs:
      - targets: ["logger-service:6008"]
    metrics_path: /metrics

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:6012"]
    metrics_path: /metrics

  - job_name: "kafka-service"
    static_configs:
      - targets: ["kafka-service:9009"]
    metrics_path: /metrics

  - job_name: "recommendation-service"
    static_configs:
      - targets: ["recommendation-service:9010"]
    metrics_path: /metrics

  # Kafka Exporter (danielqsj/kafka-exporter) — enables consumer lag metrics
  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    metrics_path: /metrics

  # mongodb exporter disabled — project uses MongoDB Atlas (see docker-compose.infra.yml)
  # - job_name: "mongodb"
  #   static_configs:
  #     - targets: ["mongodb-exporter:9216"]
  #   metrics_path: /metrics


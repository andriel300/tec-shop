global:
  resolve_timeout: 5m
  slack_api_url: "https://hooks.slack.com/services/T000000000/B000000000/placeholder"

route:
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "null"
  routes:
    - matchers:
        - severity="critical"
      receiver: slack-critical
    - matchers:
        - severity="warning"
      receiver: slack-warning

receivers:
  - name: "null"

  - name: slack-critical
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Service:* {{ .Labels.service | default .Labels.job }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: slack-warning
    slack_configs:
      - channel: "#alerts-warning"
        send_resolved: true
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Service:* {{ .Labels.service | default .Labels.job }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

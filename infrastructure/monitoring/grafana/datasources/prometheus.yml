# Grafana datasource provisioning configuration for Prometheus
# Place this file at: /etc/grafana/provisioning/datasources/prometheus.yml
# (or mount as ConfigMap in Kubernetes)

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      exemplarTraceIdDestinations:
        - name: traceId
          datasourceUid: tempo
    version: 1

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
    version: 1

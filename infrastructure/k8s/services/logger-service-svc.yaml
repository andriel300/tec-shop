    app.kubernetes.io/name: logger-service
    app.kubernetes.io/part-of: tec-shop
spec:
  type: ClusterIP
  selector:
    app: logger-service
  ports:
    - name: tcp
      port: 6008
      targetPort: 6008
      protocol: TCP

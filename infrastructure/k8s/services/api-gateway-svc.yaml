apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: tec-shop
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: tec-shop
spec:
  # LoadBalancer exposes the API gateway externally
  # TODO: For cloud providers (GKE/EKS/AKS), this will provision a cloud load balancer
  # TODO: Consider using an Ingress + ClusterIP instead for cost savings
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8080
      protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: tec-shop
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: tec-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          # TODO: Replace with your container registry image path
          image: your-registry/tec-shop-api-gateway:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tec-shop-config
            - secretRef:
                name: tec-shop-secrets
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
          # TODO: Tune resource limits based on load testing results
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            # TODO: Adjust initialDelaySeconds based on actual startup time
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # TODO: Add volumeMounts for mTLS certs if using in-cluster TLS
      # TODO: Add nodeSelector or affinity rules for node placement
      # TODO: Add tolerations if using dedicated node pools

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: tec-shop
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: tec-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/name: auth-service
    spec:
      containers:
        - name: auth-service
          # TODO: Replace with your container registry image path
          image: your-registry/tec-shop-auth-service:latest
          ports:
            - containerPort: 6001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tec-shop-config
            - secretRef:
                name: tec-shop-secrets
          env:
            - name: PORT
              value: "6001"
            - name: NODE_ENV
              value: "production"
          # TODO: Tune resource limits based on load testing results
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 6001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 6001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
